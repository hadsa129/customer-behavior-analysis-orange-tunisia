{% extends 'admin_dashboard/base.html' %}
{% load static %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">🚀 Launch ETL Job</h1>
            
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <div class="space-y-4">
                    <label class="block text-sm font-medium text-gray-700">
                        {{ form.job_type.label }}
                    </label>
                    {{ form.job_type }}
                    {% if form.job_type.errors %}
                    <p class="text-red-500 text-xs mt-1">{{ form.job_type.errors }}</p>
                    {% endif %}
                </div>

                <div class="flex items-center justify-between mt-6">
                    <a href="{% url 'dashboard_home' %}" class="text-gray-600 hover:text-gray-800">
                        ← Back to Dashboard
                    </a>
                    <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                        Launch Job
                    </button>
                </div>
            </form>

            {% if log %}
            <div class="mt-8">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">Job Output</h2>
                <div class="bg-gray-100 rounded p-4 font-mono text-sm overflow-x-auto">
                    <pre>{{ log }}</pre>
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
