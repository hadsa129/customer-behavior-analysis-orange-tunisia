{% extends 'admin_dashboard/base.html' %}
{% load static %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="bg-white rounded-lg shadow-lg p-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Job Details</h1>
                <p class="text-gray-600">{{ job.job_name }}</p>
            </div>
            <a href="{% url 'job_history' %}" class="text-gray-600 hover:text-gray-800">
                ← Back to Job History
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-gray-50 rounded p-4">
                <h3 class="text-sm font-medium text-gray-500">Job Type</h3>
                <p class="mt-1 text-lg font-semibold">{{ job.job_type }}</p>
            </div>
            <div class="bg-gray-50 rounded p-4">
                <h3 class="text-sm font-medium text-gray-500">Status</h3>
                <p class="mt-1">
                    <span class="px-2 py-1 rounded text-sm 
                        {% if job.status == 'Success' %}bg-green-100 text-green-800
                        {% elif job.status == 'Failed' %}bg-red-100 text-red-800
                        {% else %}bg-yellow-100 text-yellow-800{% endif %}">
                        {{ job.status }}
                    </span>
                </p>
            </div>
            <div class="bg-gray-50 rounded p-4">
                <h3 class="text-sm font-medium text-gray-500">Started At</h3>
                <p class="mt-1 text-lg font-semibold">{{ job.timestamp|date:"Y-m-d H:i:s" }}</p>
            </div>
        </div>

        <div class="mt-8">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Job Logs</h2>
            <div class="bg-gray-100 rounded p-4 font-mono text-sm overflow-x-auto">
                <pre class="whitespace-pre-wrap">{{ log_content }}</pre>
            </div>
        </div>
    </div>
</div>
{% endblock %}
