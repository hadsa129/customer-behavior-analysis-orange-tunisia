<!-- templates/marketing_dashboard/error.html -->
{% extends "marketing_dashboard/base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="alert alert-danger" role="alert">
        <h4 class="alert-heading">Error</h4>
        <p>{{ error }}</p>
        <hr>
        <p class="mb-0">Please try again or contact support if the problem persists.</p>
    </div>
    <a href="{% url 'marketing_dashboard:home' %}" class="btn btn-primary">Return to Dashboard</a>
</div>
{% endblock %}
