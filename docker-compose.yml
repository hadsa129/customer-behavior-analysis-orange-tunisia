
services:
  postgres:
    image: postgres:13-alpine
    container_name: hive-metastore-postgres
    platform: linux/amd64
    restart: always
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hiveuser
      POSTGRES_PASSWORD: hivepassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-hive-metastore.sql:/docker-entrypoint-initdb.d/init-hive-metastore.sql
    ports:
      - "5432:5432"
    networks:
      - hadoop-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./postgres/servers.json:/pgadmin4/servers.json
    ports:
      - "8085:80"
    depends_on:
      - postgres
    networks:
      - hadoop-network

  namenode:
    build:
      context: .
      dockerfile: hadoop.Dockerfile
    container_name: namenode
    hostname: namenode
    restart: always
    environment:
      - CLUSTER_NAME=hadoop-cluster
      - HDFS_NAMENODE_USER=root
      - HADOOP_SSH_OPTS="-o StrictHostKeyChecking=no"
    volumes:
      - namenode-data:/hadoop/dfs/name
    ports:
      - "9870:9870" # NameNode Web UI
      - "9000:9000" # NameNode RPC
    networks:
      - hadoop-network

  datanode:
    build:
      context: .
      dockerfile: hadoop.Dockerfile
    container_name: datanode
    hostname: datanode
    restart: always
    environment:
      - HDFS_NAMENODE_USER=root
    volumes:
      - datanode-data:/hadoop/dfs/data
    ports:
      - "9864:9864" # DataNode Web UI
    depends_on:
      - namenode
    networks:
      - hadoop-network

  spark-master:
    container_name: spark-master
    build: 
      context: .
      dockerfile: spark.Dockerfile
    image: spark-image
    restart: always
    hostname: spark-master
    entrypoint: ['./entrypoint.sh', 'master']
    environment:
      - SPARK_MASTER_HOST=spark-master
    volumes:
      - spark-data:/opt/spark/data
      - ./spark_apps:/opt/spark/apps
      - spark-logs:/opt/spark/spark-events
    ports:
      - "8080:8080" # Spark Master UI
      - "7077:7077" # Spark Master port
    networks:
      - hadoop-network

  spark-history-server:
    container_name: spark-history-server
    image: spark-image
    restart: always
    entrypoint: ['./entrypoint.sh', 'history']
    volumes:
      - spark-logs:/opt/spark/spark-events
    ports:
      - "18080:18080"
    depends_on:
      - spark-master
    networks:
      - hadoop-network

  spark-worker-1:
    image: spark-image
    container_name: spark-worker-1
    restart: always
    hostname: spark-worker-1
    entrypoint: ['./entrypoint.sh', 'worker']
    environment:
      - SPARK_WORKER_WEBUI_PORT=8081
      - SPARK_MASTER=spark://spark-master:7077
    volumes:
      - spark-data:/opt/spark/data
      - ./spark_apps:/opt/spark/apps
      - spark-logs:/opt/spark/spark-events
    depends_on:
      - spark-master
    networks:
      - hadoop-network

  hive:
    build:
      context: .
      dockerfile: hive.Dockerfile
    container_name: hive-server
    restart: always
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=metastore
      - POSTGRES_USER=hiveuser
      - POSTGRES_PASSWORD=hivepassword
    depends_on:
      - postgres
      - namenode
    ports:
      - "10000:10000" # HiveServer2
      - "10002:10002" # Hive Metastore
    networks:
      - hadoop-network

  hue:
    image: gethue/hue:latest
    container_name: hue
    platform: linux/amd64
    restart: always
    environment:
      - HUE_DATABASE_ENGINE=postgresql
      - HUE_DATABASE_HOST=postgres
      - HUE_DATABASE_USER=hueuser
      - HUE_DATABASE_PASSWORD=huepassword
    depends_on:
      - postgres
      - hive
    ports:
      - "8888:8888"
    networks:
      - hadoop-network

  django:
    build:
      context: ./client_behavior_platform
    container_name: django-app
    restart: always
    volumes:
      - ./client_behavior_platform:/app
      - ./data:/app/data
      - ./client_behavior_platform/catalogue.csv:/app/catalogue.csv
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=hiveuser
      - POSTGRES_PASSWORD=hivepassword
      - DJANGO_SETTINGS_MODULE=client_behavior_platform.settings
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    depends_on:
      - postgres
      - ollama
    ports:
      - "8000:8000"
    networks:
      - hadoop-network

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    entrypoint: |
      sh -c "
      ollama serve &
      until ollama pull qwen2.5:3b; do
        echo 'Failed to pull model, retrying in 5 seconds...'
        sleep 5
      done
      tail -f /dev/null
      "
    environment:
      - OLLAMA_MAX_CTX=8192
    networks:
      - hadoop-network
    

volumes:
  postgres-data:
  pgadmin-data:
  namenode-data:
  datanode-data:
  spark-data:
  spark-logs:
  ollama-models:

networks:
  hadoop-network:
    driver: bridge